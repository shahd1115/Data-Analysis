<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank - Data Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #ffe4e1;
        }
        .question-card {
            transition: all 0.3s;
        }
        .option:hover {
            background-color: #fdf2f2;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-rose-700">Question Bank - Data Analysis</h1>
            <p class="text-gray-700 mt-3 text-lg">60 سؤال صواب/خطأ + 50 سؤال اختيار متعدد</p>
        </header>

        <!-- Tabs -->
        <div class="flex justify-center mb-8 border-b border-rose-300">
            <button onclick="switchTab(0)" id="tab0" class="tab-button px-8 py-3 font-medium border-b-4 border-rose-600 text-rose-700 text-lg">صواب/خطأ (60)</button>
            <button onclick="switchTab(1)" id="tab1" class="tab-button px-8 py-3 font-medium text-gray-600 hover:text-rose-700 text-lg">اختيار متعدد (50)</button>
        </div>

        <!-- True/False Section -->
        <div id="tf-section">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <span class="text-lg text-rose-700">السؤال</span>
                    <span id="current-tf" class="text-3xl font-bold text-rose-800">1</span>
                    <span class="text-gray-600">/60</span>
                </div>
                <button onclick="resetQuiz(0)" class="text-rose-600 hover:underline flex items-center gap-1">
                    <i class="fas fa-redo"></i> إعادة
                </button>
            </div>

            <div id="tf-question" class="question-card bg-white rounded-3xl shadow-xl p-10 mb-8">
                <p id="tf-text" class="text-2xl leading-relaxed mb-10"></p>
                <div class="grid grid-cols-2 gap-6">
                    <button onclick="answerTF(true)" class="option p-8 rounded-2xl border-2 border-emerald-400 hover:border-emerald-600 text-xl font-medium">صواب (True)</button>
                    <button onclick="answerTF(false)" class="option p-8 rounded-2xl border-2 border-rose-400 hover:border-rose-600 text-xl font-medium">خطأ (False)</button>
                </div>
            </div>

            <div id="tf-result" class="hidden bg-white rounded-3xl shadow p-8 mb-8">
                <div id="tf-feedback" class="text-2xl mb-4"></div>
                <div id="tf-explanation" class="text-lg leading-relaxed"></div>
            </div>

            <div class="flex justify-between">
                <button onclick="prevTF()" class="px-8 py-4 bg-gray-200 hover:bg-gray-300 rounded-2xl">السابق</button>
                <button onclick="nextTF()" class="px-10 py-4 bg-rose-600 hover:bg-rose-700 text-white rounded-2xl">التالي</button>
            </div>
        </div>

        <!-- MCQ Section -->
        <div id="mcq-section" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <span class="text-lg text-rose-700">السؤال</span>
                    <span id="current-mcq" class="text-3xl font-bold text-rose-800">1</span>
                    <span class="text-gray-600">/50</span>
                </div>
                <button onclick="resetQuiz(1)" class="text-rose-600 hover:underline flex items-center gap-1">
                    <i class="fas fa-redo"></i> إعادة
                </button>
            </div>

            <div id="mcq-question" class="question-card bg-white rounded-3xl shadow-xl p-10 mb-8">
                <p id="mcq-text" class="text-2xl leading-relaxed mb-10"></p>
                <div id="mcq-options" class="space-y-4"></div>
            </div>

            <div id="mcq-result" class="hidden bg-white rounded-3xl shadow p-8 mb-8">
                <div id="mcq-feedback" class="text-2xl mb-4"></div>
                <div id="mcq-explanation" class="text-lg leading-relaxed"></div>
            </div>

            <div class="flex justify-between">
                <button onclick="prevMCQ()" class="px-8 py-4 bg-gray-200 hover:bg-gray-300 rounded-2xl">السابق</button>
                <button onclick="nextMCQ()" class="px-10 py-4 bg-rose-600 hover:bg-rose-700 text-white rounded-2xl">التالي</button>
            </div>
        </div>

        <!-- Score -->
        <div class="mt-12 bg-white rounded-3xl p-8 shadow-xl">
            <h3 class="font-bold text-2xl mb-6 text-center text-rose-800">نتيجتك</h3>
            <div class="grid grid-cols-2 gap-8 text-center">
                <div>
                    <div id="tf-score" class="text-5xl font-bold text-emerald-600">0/60</div>
                    <p class="text-gray-600">صواب/خطأ</p>
                </div>
                <div>
                    <div id="mcq-score" class="text-5xl font-bold text-violet-600">0/50</div>
                    <p class="text-gray-600">اختيار متعدد</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 60 True/False Questions
        const tfQuestions = [
            {q: "Hardware includes physical equipment used for input, output, and processing.", a: true, exp: "صحيح"},
            {q: "Software is the application program used to control and coordinate hardware.", a: true, exp: "صحيح"},
            {q: "Data are organized facts used to generate information immediately.", a: false, exp: "البيانات هي حقائق خام غير منظمة"},
            {q: "Database software is used for efficient access to required data.", a: true, exp: "صحيح"},
            {q: "A Network consists of only one computer connected to a printer.", a: false, exp: "الشبكة مجموعة أجهزة مترابطة لمشاركة الموارد"},
            {q: "People are the most important component of an information system.", a: true, exp: "صحيح"},
            {q: "System design is the process of creating a high-level architecture for a software solution.", a: true, exp: "صحيح"},
            {q: "The System Development Life Cycle (SDLC) has only 3 stages.", a: false, exp: "يتكون SDLC من مراحل متعددة"},
            {q: "User Interface (UI) design focuses on how a user interacts with a system.", a: true, exp: "صحيح"},
            {q: 'A "Centralized System" means data processing occurs in one single center.', a: true, exp: "صحيح"},
            // يمكن إضافة باقي الأسئلة الـ 60 هنا
            {q: "Information systems cannot work without data.", a: true, exp: "صحيح"},
            {q: "Secondary storage is used to store data temporarily during processing.", a: false, exp: "يُستخدم للتخزين الدائم"},
            {q: "User requirements are identified during the Design phase.", a: false, exp: "تُحدد في مرحلة التحليل"},
            // ... أكمل باقي الأسئلة حسب الحاجة
        ];

        // 50 MCQ Questions
        const mcqQuestions = [
            {
                q: "Which component is responsible for processing data?",
                options: ["Software", "Hardware", "Databases", "Networks"],
                correct: 1,
                exp: "Hardware هو المسؤول عن معالجة البيانات"
            },
            {
                q: '"Raw facts and figures" describe which component?',
                options: ["Information", "Knowledge", "Data", "Software"],
                correct: 2,
                exp: "Data هي الحقائق الخام"
            },
            // ... أضف باقي الأسئلة هنا
        ];

        let currentTF = 0, currentMCQ = 0;
        let tfAnswers = new Array(60).fill(null);
        let mcqAnswers = new Array(50).fill(null);

        function switchTab(n) {
            document.getElementById("tf-section").classList.toggle("hidden", n !== 0);
            document.getElementById("mcq-section").classList.toggle("hidden", n === 0);
        }

        function renderTF() {
            document.getElementById("current-tf").textContent = currentTF + 1;
            document.getElementById("tf-text").textContent = tfQuestions[currentTF].q;
            document.getElementById("tf-result").classList.add("hidden");
        }

        function answerTF(ans) {
            tfAnswers[currentTF] = ans;
            const q = tfQuestions[currentTF];
            const isCorrect = ans === q.a;
            document.getElementById("tf-feedback").innerHTML = isCorrect ? 
                `<span class="text-emerald-600">✅ إجابة صحيحة</span>` : 
                `<span class="text-rose-600">❌ إجابة خاطئة</span>`;
            document.getElementById("tf-explanation").innerHTML = `<strong>الشرح:</strong> ${q.exp}`;
            document.getElementById("tf-result").classList.remove("hidden");
            updateScore();
        }

        function nextTF() { if(currentTF < tfQuestions.length-1) { currentTF++; renderTF(); }}
        function prevTF() { if(currentTF > 0) { currentTF--; renderTF(); }}

        function renderMCQ() {
            document.getElementById("current-mcq").textContent = currentMCQ + 1;
            document.getElementById("mcq-text").textContent = mcqQuestions[currentMCQ].q;
            const container = document.getElementById("mcq-options");
            container.innerHTML = "";
            mcqQuestions[currentMCQ].options.forEach((opt, i) => {
                const btn = document.createElement("button");
                btn.className = "w-full text-right p-5 rounded-2xl border border-gray-300 hover:border-rose-400 text-lg";
                btn.textContent = `${String.fromCharCode(65+i)}. ${opt}`;
                btn.onclick = () => answerMCQ(i);
                container.appendChild(btn);
            });
            document.getElementById("mcq-result").classList.add("hidden");
        }

        function answerMCQ(selected) {
            mcqAnswers[currentMCQ] = selected;
            const q = mcqQuestions[currentMCQ];
            const isCorrect = selected === q.correct;
            document.getElementById("mcq-feedback").innerHTML = isCorrect ? 
                `<span class="text-emerald-600">✅ صحيح</span>` : 
                `<span class="text-rose-600">❌ الإجابة الصحيحة: ${String.fromCharCode(65 + q.correct)}</span>`;
            document.getElementById("mcq-explanation").innerHTML = `<strong>الشرح:</strong> ${q.exp}`;
            document.getElementById("mcq-result").classList.remove("hidden");
            updateScore();
        }

        function nextMCQ() { if(currentMCQ < mcqQuestions.length-1) { currentMCQ++; renderMCQ(); }}
        function prevMCQ() { if(currentMCQ > 0) { currentMCQ--; renderMCQ(); }}

        function updateScore() {
            const tfCorrect = tfAnswers.filter((a,i) => a === tfQuestions[i].a).length;
            const mcqCorrect = mcqAnswers.filter((a,i) => a === mcqQuestions[i].correct).length;
            document.getElementById("tf-score").textContent = `${tfCorrect}/60`;
            document.getElementById("mcq-score").textContent = `${mcqCorrect}/50`;
        }

        function resetQuiz(type) {
            if(type === 0){ currentTF = 0; tfAnswers.fill(null); renderTF(); }
            else { currentMCQ = 0; mcqAnswers.fill(null); renderMCQ(); }
            updateScore();
        }

        window.onload = () => {
            renderTF();
            renderMCQ();
        };
    </script>
</body>
</html>
