<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Bank - Data Analysis</title>
  <style>
    body {
      font-family: 'Times New Roman', serif;
      background-color: #ffdce8;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .section-title {
      margin-top: 40px;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
    }

    .question-box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      border-radius: 15px;
      max-width: 900px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .question {
      font-size: 20px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .option {
      display: block;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .option:hover {
      background-color: #ffeaf1;
    }

    button {
      display: block;
      margin: 30px auto;
      padding: 15px 30px;
      border: none;
      border-radius: 12px;
      background-color: #ff8fb1;
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-family: 'Times New Roman', serif;
    }

    button:hover {
      background-color: #ff6f99;
    }

    .correct {
      background-color: #b8f5b1 !important;
    }

    .wrong {
      background-color: #ffb3b3 !important;
    }

    #score {
      text-align: center;
      font-size: 28px;
      margin-top: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Question Bank - Data Analysis</h1>

<div class="section-title">True / False Questions</div>
<div id="tf-container"></div>

<div class="section-title">MCQ Questions</div>
<div id="mcq-container"></div>

<button onclick="checkAnswers()">Submit Answers</button>
<div id="score"></div>

<script>
const tfQuestions = [
  {q:'1- Hardware includes physical equipment used for input, output, and processing.', a:'True'},
  {q:'2- Software is the application program used to control and coordinate hardware.', a:'False'},
  {q:'3- Data are organized facts used to generate information immediately.', a:'False'},
  {q:'4- Database software is used for efficient access to required data.', a:'True'},
  {q:'5- A Network consists of only one computer connected to a printer.', a:'False'},
  {q:'6- People are the most important component of an information system.', a:'True'},
  {q:'7- System design is the process of creating a high-level architecture for a software solution.', a:'True'},
  {q:'8- The System Development Life Cycle (SDLC) has only 3 stages.', a:'False'},
  {q:'9- User Interface (UI) design focuses on how a user interacts with a system.', a:'True'},
  {q:'10- A Centralized System means data processing occurs in one single center.', a:'True'},
  {q:'11- System Software includes Device Drivers and Firmware.', a:'True'},
  {q:'12- Analysis is the stage where the actual code is written.', a:'False'},
  {q:'13- Feasibility studies help determine if a project should move forward.', a:'True'},
  {q:'14- Direct cutover is a method of moving components from an old system to a new one.', a:'True'},
  {q:'15- Dialogue design is a sequence of information displayed to and obtained from a user.', a:'True'},
  {q:'16- Operating systems are a type of Application Software.', a:'False'},
  {q:'17- Maintenance is the last stage of the SDLC.', a:'True'},
  {q:'18- Scalability is a decision made during the system design phase.', a:'True'},
  {q:'19- Information systems cannot work without data.', a:'True'},
  {q:'20- Secondary storage is used to store data temporarily during processing.', a:'False'},
  {q:'21- User requirements are identified during the Design phase.', a:'False'},
  {q:'22- Decentralized systems have a processing center for each major department.', a:'True'},
  {q:'23- Utility software is a type of system software.', a:'True'},
  {q:'24- Testing ensures the program is successful before client production.', a:'True'},
  {q:'25- Dialogue diagrams use boxes with three sections.', a:'True'},
  {q:'26- System design involves making decisions about security and performance.', a:'True'},
  {q:'27- A Network allows for the sharing of resources like printers.', a:'True'},
  {q:'28- Database Management Systems (DBMS) manage data storage.', a:'True'},
  {q:'29- People are not considered a component of Information Systems.', a:'False'},
  {q:'30- Processors are considered a hardware component.', a:'True'},
  {q:'31- System design meets the constraints of a problem.', a:'True'},
  {q:'32- Analysis phase results include a clear definition of the problem.', a:'True'},
  {q:'33- The budget for a new system is determined after it is built.', a:'False'},
  {q:'34- Monitoring for bugs occurs during the Operations and Maintenance phase.', a:'True'},
  {q:'35- Dialogue diagrams represent the sequencing of displays.', a:'True'},
  {q:'36- Input devices are part of the hardware structure.', a:'True'},
  {q:'37- Application software coordinates hardware components.', a:'False'},
  {q:'38- Data flows are a key consideration in system design.', a:'True'},
  {q:'39- Decentralization can improve data processing speed for specific departments.', a:'True'},
  {q:'40- Implementation includes the process of Direct Cutover.', a:'True'},
  {q:'41- User Interface design includes the Principles for good design.', a:'True'},
  {q:'42- System Analysis results include a description of the current system.', a:'True'},
  {q:'43- Computer peripherals are NOT considered hardware.', a:'False'},
  {q:'44- Operations and Maintenance identify parts of a system that need improving.', a:'True'},
  {q:'45- A bidirectional line in a dialogue diagram connects sections.', a:'True'},
  {q:'46- An information system consists of unrelated components.', a:'False'},
  {q:'47- Hardware includes input, output, and processing devices.', a:'True'},
  {q:'48- Software is only used for entertainment purposes.', a:'False'},
  {q:'49- Data are raw facts that must be processed to become information.', a:'True'},
  {q:'50- Database Management Systems (DBMS) manage data efficiently.', a:'True'},
  {q:'51- Procedures include step-by-step instructions for tasks.', a:'True'},
  {q:'52- Human resources include programmers and system analysts.', a:'True'},
  {q:'53- The main purpose of an information system is to benefit end users.', a:'True'},
  {q:'54- ERP systems are examples of information systems.', a:'True'},
  {q:'55- Hardware can operate effectively without software.', a:'False'},
  {q:'56- System Analysis focuses mainly on programming activities.', a:'False'},
  {q:'57- The Planning Stage includes economic, technical, and operational feasibility.', a:'True'},
  {q:'58- Functional requirements describe system performance and security only.', a:'False'},
  {q:'59- Users, clients, and technical staff are primary stakeholders.', a:'True'},
  {q:'60- Prototyping is used only after system implementation.', a:'False'}
];

const mcqQuestions = [
  {q:'1- Which component is responsible for processing data?', o:['Software','Hardware','Databases','Networks'], a:'Hardware'},
  {q:'2- Raw facts and figures describe which component?', o:['Information','Knowledge','Data','Software'], a:'Data'},
  {q:'3- What are the three types of software mentioned?', o:['System, Application, Utility','Primary, Secondary, Tertiary','Input, Output, Storage','User, Admin, Guest'], a:'System, Application, Utility'},
  {q:'4- Which phase involves creating high-level architecture?', o:['Planning','Analysis','System Design','Implementation'], a:'System Design'},
  {q:'5- A set of computers connected to share resources is a:', o:['Database','Processor','Network','Middleware'], a:'Network'},
  {q:'6- Which of these is a hardware output device?', o:['Keyboard','Mouse','Printer','Scanner'], a:'Printer'},
  {q:'7- The process of designing the sequence for user interaction is:', o:['Data Flow Design','Dialogue Design','Database Design','Network Design'], a:'Dialogue Design'},
  {q:'8- In which SDLC stage do you monitor for bugs?', o:['Design','Testing','Operations and Maintenance','Analysis'], a:'Operations and Maintenance'},
  {q:'9- Which system type has processing at each department?', o:['Centralized','Decentralized','Unitary','Singular'], a:'Decentralized'},
  {q:'10- A Direct Cutover is part of which phase?', o:['Maintenance','Design','Implementation','Analysis'], a:'Implementation'},
  {q:'11- What is the goal of UI design?', o:['To write code','To design how users interact with the system','To manage databases','To fix hardware'], a:'To design how users interact with the system'},
  {q:'12- Which software is classified as System Software?', o:['MS Word','Device Drivers','Games','Web Browsers'], a:'Device Drivers'},
  {q:'13- Analysis results include which of the following?', o:['Final Code','Hardware Purchase','Feasibility study results','User Manuals'], a:'Feasibility study results'},
  {q:'14- Database software is used to manage:', o:['Physical hardware','Virtual resources','Knowledge bases','Network cables'], a:'Knowledge bases'},
  {q:'15- Dialogue diagrams use which symbol?', o:['Circle','Triangle','Box with three sections','Diamond'], a:'Box with three sections'},
  {q:'16- Scalability refers to:', o:['Data size','System ability to grow','Network speed','User happiness'], a:'System ability to grow'},
  {q:'17- SDLC stands for:', o:['System Design Logical Cycle','Software Development Life Cycle','System Development Life Cycle','Standard Data Line Connection'], a:'System Development Life Cycle'},
  {q:'18- Which component coordinates hardware?', o:['Users','Application Software','System Software','Peripheral devices'], a:'System Software'},
  {q:'19- Data are managed using:', o:['CPU','DBMS','RAM','BIOS'], a:'DBMS'},
  {q:'20- Firmware is a type of:', o:['Hardware','Database','Software','Network'], a:'Software'},
  {q:'21- Who is the most important component of an IS?', o:['Computers','Data','People','Networks'], a:'People'},
  {q:'22- What determines hardware structure?', o:['Color of the office','Type and size of organization','The type of internet','The number of users only'], a:'Type and size of organization'},
  {q:'23- Which phase follows Analysis?', o:['Planning','Implementation','System Design','Maintenance'], a:'System Design'},
  {q:'24- Which involves creating a plan for a software solution?', o:['Maintenance','System Design','Sales','Training'], a:'System Design'},
  {q:'25- What does a circle or rounded rectangle represent in a DFD?', o:['External Entity','Data Store','Process','Data Flow'], a:'Process'},
  {q:'26- Which DFD level shows the most high-level view of a system?', o:['Level 0','Level 1','Level 2','Level 3'], a:'Level 0'},
  {q:'27- A data store is represented by which symbol?', o:['Arrow','Square','Circle','Open-ended rectangle'], a:'Open-ended rectangle'},
  {q:'28- Which of the following is NOT a component of a DFD?', o:['Relationship','Process','Data Store','External Entity'], a:'Relationship'},
  {q:'29- Breaking a high-level process into smaller sub-processes is called:', o:['Normalization','Decomposition','Integration','Encapsulation'], a:'Decomposition'},
  {q:'30- Which DFD shows what the system does without implementation details?', o:['Physical DFD','Logical DFD','Implementation DFD','Context DFD'], a:'Logical DFD'},
  {q:'31- Which of these is used to describe the logic inside a process?', o:['Structured English','Data Store','External Entity','Data Flow'], a:'Structured English'},
  {q:'32- What is the main benefit of using DFDs?', o:['Easy for technical and non-technical users to understand','Shows exact hardware requirements','Generates automatic code','Replaces the need for testing'], a:'Easy for technical and non-technical users to understand'},
  {q:'33- The Context Diagram contains how many processes?', o:['Zero','One','Five','Unlimited'], a:'One'},
  {q:'34- A DFD is a tool for:', o:['Process modeling','Data modeling','Network modeling','Object modeling'], a:'Process modeling'},
  {q:'35- Which symbol is used for an external entity?', o:['Square/Rectangle','Circle','Double Line','Oval'], a:'Square/Rectangle'},
  {q:'36- SSAD stands for:', o:['Simple System Analysis Design','Structured System Analysis Design','Standard System Analysis Development','Sequential System Analysis Design'], a:'Structured System Analysis Design'},
  {q:'37- In a DFD, data flow can occur between:', o:['Two data stores','Two external entities','A process and a data store','An external entity and a data store'], a:'A process and a data store'},
  {q:'38- The document that defines all data elements in the DFD is the:', o:['System Manual','Data Dictionary','Project Plan','Design Specification'], a:'Data Dictionary'},
  {q:'39- What is a Grey Hole in a DFD?', o:['A process with no output','A process with no input','A process where output is insufficient based on input','A process that works perfectly'], a:'A process where output is insufficient based on input'},
  {q:'40- By normalizing relations or sets of relations, one minimizes:', o:['Data','Fields','Redundancy','Database'], a:'Redundancy'},
  {q:'41- Which of the following is NOT a component of an information system?', o:['Hardware','Software','Marketing','Procedures'], a:'Marketing'},
  {q:'42- Raw facts before processing are called:', o:['Information','Data','Output','Knowledge'], a:'Data'},
  {q:'43- Which software controls hardware?', o:['Application Software','Utility Software','System Software','Antivirus'], a:'System Software'},
  {q:'44- DBMS is mainly used to:', o:['Delete hardware','Manage databases','Replace employees','Increase CPU speed'], a:'Manage databases'},
  {q:'45- Which is an example of an information system?', o:['Online banking system','Mouse','Printer cable','Scanner only'], a:'Online banking system'},
  {q:'46- Procedures help organizations to:', o:['Increase processor speed','Standardize workflow','Remove software','Delete data'], a:'Standardize workflow'},
  {q:'47- End users of an information system include:', o:['Managers','Accountants','Engineers','All of the above'], a:'All of the above'},
  {q:'48- An information system performs which cycle?', o:['Delete → Ignore → Stop','Input → Process → Output','Print → Shut down','Store → Forget'], a:'Input → Process → Output'},
  {q:'49- Security devices belong to:', o:['Hardware','Software','Procedures','Data'], a:'Hardware'},
  {q:'50- Utility software is mainly used to:', o:['Play games','Maintain and protect system','Build hardware','Replace OS'], a:'Maintain and protect system'}
];

function createQuestions(containerId, questions, type) {
  const container = document.getElementById(containerId);

  questions.forEach((item, index) => {
    const box = document.createElement('div');
    box.className = 'question-box';

    let optionsHTML = '';

    const options = type === 'tf' ? ['True','False'] : item.o;

    options.forEach(option => {
      optionsHTML += `
        <label class="option">
          <input type="radio" name="${type}${index}" value="${option}" onchange="instantCheck('${type}', ${index}, '${option(/'/g, "\'")}')">
          ${option}
        </label>`;
    });${index}" value="${option}">
          ${option}
        </label>`;
      });
    }

    box.innerHTML = `
      <div class="question">${item.q}</div>
      ${optionsHTML}
      <div id="feedback-${type}${index}" style="margin-top:10px;font-weight:bold;"></div>
    `;

    container.appendChild(box);
  });
}

createQuestions('tf-container', tfQuestions, 'tf');
createQuestions('mcq-container', mcqQuestions, 'mcq');

function instantCheck(type, index, selectedValue) {
  const data = type === 'tf' ? tfQuestions[index] : mcqQuestions[index];
  const feedback = document.getElementById(`feedback-${type}${index}`);
  const allOptions = document.querySelectorAll(`input[name="${type}${index}"]`);

  allOptions.forEach(opt => {
    opt.parentElement.classList.remove('correct', 'wrong');

    if(opt.value === data.a) {
      opt.parentElement.classList.add('correct');
    }
  });

  if(selectedValue === data.a) {
    feedback.innerHTML = '✅ Correct Answer';
  } else {
    feedback.innerHTML = `❌ Wrong Answer — Correct Answer: ${data.a}`;

    allOptions.forEach(opt => {
      if(opt.checked && opt.value !== data.a) {
        opt.parentElement.classList.add('wrong');
      }
    });
  }
}

function checkAnswers() {
  let score = 0;
  let total = tfQuestions.length + mcqQuestions.length;

  document.querySelectorAll('.option').forEach(el => {
    el.classList.remove('correct', 'wrong');
  });

  tfQuestions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="tf${i}"]:checked`);
    const allOptions = document.querySelectorAll(`input[name="tf${i}"]`);

    allOptions.forEach(opt => {
      if(opt.value === q.a) {
        opt.parentElement.classList.add('correct');
      }
    });

    if(selected) {
      if(selected.value === q.a) {
        score++;
        selected.parentElement.innerHTML += ' ✅ Correct';
      } else {
        selected.parentElement.classList.add('wrong');
        selected.parentElement.innerHTML += ` ❌ Wrong - Correct Answer: ${q.a}`;
      }
    }
  });

  mcqQuestions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="mcq${i}"]:checked`);
    const allOptions = document.querySelectorAll(`input[name="mcq${i}"]`);

    allOptions.forEach(opt => {
      if(opt.value === q.a) {
        opt.parentElement.classList.add('correct');
      }
    });

    if(selected) {
      if(selected.value === q.a) {
        score++;
        selected.parentElement.innerHTML += ' ✅ Correct';
      } else {
        selected.parentElement.classList.add('wrong');
        selected.parentElement.innerHTML += ` ❌ Wrong - Correct Answer: ${q.a}`;
      }
    }
  });

  document.getElementById('score').innerHTML = `Your Score: ${score} / ${total}`;
}
</script>

</body>
</html>
