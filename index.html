<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank - Data Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #FFE4E1;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #8B0000;
            margin-bottom: 30px;
            font-size: 36px;
            border-bottom: 3px solid #8B0000;
            padding-bottom: 10px;
        }
        .section-title {
            text-align: center;
            color: #8B0000;
            margin: 30px 0 20px 0;
            font-size: 28px;
            background: #FFB6C1;
            padding: 10px;
            border-radius: 10px;
        }
        .question-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-right: 5px solid #FF69B4;
        }
        .question-number {
            display: inline-block;
            background: #FF69B4;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .option-btn {
            padding: 10px 25px;
            border: 2px solid #FF69B4;
            background: white;
            color: #FF69B4;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            transition: all 0.3s;
        }
        .option-btn:hover {
            background: #FF69B4;
            color: white;
        }
        .option-btn.correct {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }
        .option-btn.wrong {
            background: #dc3545;
            border-color: #dc3545;
            color: white;
        }
        .feedback {
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            font-size: 16px;
            line-height: 1.6;
        }
        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .score-board {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 18px;
            z-index: 1000;
            border: 2px solid #FF69B4;
        }
        .score-board span {
            color: #FF69B4;
            font-weight: bold;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #FFE4E1;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #FF69B4;
            border-radius: 5px;
            transition: width 0.5s;
        }
        .tab-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 30px;
            border: none;
            background: #FFB6C1;
            color: #8B0000;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Times New Roman', Times, serif;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            background: #FF69B4;
            color: white;
        }
        .tab-btn.active {
            background: #FF69B4;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .mcq-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .mcq-option-btn {
            padding: 12px 20px;
            border: 2px solid #FF69B4;
            background: white;
            color: #333;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            text-align: right;
            transition: all 0.3s;
        }
        .mcq-option-btn:hover {
            background: #FFF0F5;
        }
        .mcq-option-btn.correct {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }
        .mcq-option-btn.wrong {
            background: #dc3545;
            border-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="score-board">
        ✅ صح: <span id="correct-count">0</span> | ❌ غلط: <span id="wrong-count">0</span>
    </div>

    <div class="container">
        <h1>Question Bank - Data Analysis</h1>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('tf')">صح / غلط (60)</button>
            <button class="tab-btn" onclick="showTab('mcq')">اختيار من متعدد (50)</button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>

        <!-- True/False Section -->
        <div id="tf" class="tab-content active">
            <div class="section-title">أسئلة صح وغلط (60 سؤال)</div>
            <div id="tf-questions"></div>
        </div>

        <!-- MCQ Section -->
        <div id="mcq" class="tab-content">
            <div class="section-title">أسئلة اختيار من متعدد (50 سؤال)</div>
            <div id="mcq-questions"></div>
        </div>
    </div>

<script>
let correctCount = 0;
let wrongCount = 0;
let answeredQuestions = new Set();

function updateScore() {
    document.getElementById('correct-count').textContent = correctCount;
    document.getElementById('wrong-count').textContent = wrongCount;
    const total = 110;
    const progress = (answeredQuestions.size / total) * 100;
    document.getElementById('progress-fill').style.width = progress + '%';
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
}

// ===================== TRUE/FALSE QUESTIONS (60) =====================
